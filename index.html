<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📖 Subjective Pro - Ultimate Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <style>
    :root {
      --bg-color: #f5f2eb; --card-bg: #ffffff; --text-color: #2c3e50;
      --question-bg: #ffffff; --border-color: #e0dcd0; --btn-bg: #faf9f6; 
      --primary-color: #5d6d7e; --progress-color: #27ae60;
    }
    [data-theme="dark"] {
      --bg-color: #1a1a1a; --card-bg: #2d2d2d; --text-color: #e0e0e0;
      --question-bg: #3d3d3d; --border-color: #444; --btn-bg: #3a3a3a;
      --primary-color: #8da2b5;
    }

    body { font-family: 'Rubik', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; transition: 0.3s; }
    
    /* LOGIN UI FROM WEBSITE 1 */
    #loginArea { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #f5f2eb 0%, #e0dcd0 100%);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    [data-theme="dark"] #loginArea { background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%); }
    .login-glass-card {
      background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4); padding: 30px;
      border-radius: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      max-width: 400px; width: 90%; animation: fadeIn 0.8s ease-out;
    }
    .login-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; }
    .email-login-btn { background: #3498db; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; }
    .modern-google-btn, .guest-btn { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 12px; width: 100%; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 500; }

    /* HEADER & NAV */
    .header-btns { display: none; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
    .user-profile { position: relative; display: flex; align-items: center; cursor: pointer; }
    .user-profile img { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--primary-color); }
    .profile-dropdown { position: absolute; top: 45px; right: 0; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; min-width: 160px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; flex-direction: column; z-index: 10000; }
    .profile-dropdown button { padding: 12px; border: none; background: transparent; text-align: left; cursor: pointer; color: var(--text-color); }

    /* CONTAINER & GRID */
    .container { max-width: 700px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .grid-card { display: flex; align-items: center; padding: 15px; border-radius: 20px; border: none; cursor: pointer; transition: 0.3s; text-align: left; }
    .orange-card { background: #fff9f0; color: #d9480f; border: 1px solid #ffdec0; }
    .blue-card { background: #f0f7ff; color: #1971c2; border: 1px solid #b2dfff; }
    .red-card { background: #fff5f5; color: #c92a2a; border: 1px solid #ffc9c9; }
    .yellow-card { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

    /* QUIZ AREA STYLES */
    .question-card { background: var(--question-bg); border-left: 6px solid var(--primary-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; font-size: 22px; font-weight: 550; position: relative; }
    .exp-box { background: #dff9fb; padding: 15px; border-radius: 10px; display: none; margin-bottom: 15px; color: #130f40; border: 1px dashed #3498db; }
    [data-theme="dark"] .exp-box { background: #3d3d3d; color: #fff; }
    .exp-img { width: 100%; border-radius: 8px; margin-top: 10px; cursor: zoom-in; }

    /* UTILS */
    #bookmarkActionBtn, #heartActionBtn { background: transparent; border: none; cursor: pointer; display: none; }
    #bookmarkActionBtn svg, #heartActionBtn svg { width: 28px; height: 28px; stroke: var(--text-color); fill: none; stroke-width: 2; }
    #bookmarkActionBtn.active svg { fill: var(--text-color); }
    #heartActionBtn.active svg { fill: #e74c3c; stroke: #e74c3c; }
    #timerDisplay { font-weight: bold; color: #e74c3c; display: none; }
    .progress-container { width: 100%; background: #e0dcd0; height: 8px; border-radius: 5px; margin-bottom: 15px; display: none; }
    #progressBar { height: 100%; width: 0%; background: var(--progress-color); border-radius: 5px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 500px) { .button-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="loginArea">
    <div class="login-glass-card">
        <span style="font-size:50px;">📖</span>
        <h1>Subjective Pro</h1>
        <div style="margin-top:20px;">
          <input type="email" id="emailInput" class="login-input" placeholder="Gmail ID">
          <input type="password" id="passwordInput" class="login-input" placeholder="Password">
          <button class="email-login-btn" onclick="loginWithEmail()">Login / Sign Up</button>
        </div>
        <div style="margin: 10px 0; color: #888; font-size: 12px;">OR</div>
        <button class="modern-google-btn" onclick="loginWithGoogle()">Continue with Google</button>
        <button class="guest-btn" onclick="continueAsGuest()">👤 Bina login ke chalayein</button>
    </div>
  </div>

  <div class="header-btns" id="mainHeader">
    <div style="display:flex; gap:10px; align-items:center;">
      <button id="themeBtn" onclick="toggleTheme()">🌙</button>
      <div style="display:flex; align-items:center; gap:5px;">
        <span style="font-size:12px;">🔊</span>
        <input type="range" id="voiceSpeed" min="0.5" max="1.5" step="0.1" value="1" style="width:50px;">
      </div>
    </div>
    <div id="timerDisplay">⏳ 00:00</div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button id="heartActionBtn" onclick="handleHeartClick()"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg></button>
        <button id="bookmarkActionBtn" onclick="handleBookmarkClick()"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg></button>
        <div id="userProfile" class="user-profile" onclick="toggleProfileMenu(event)"></div>
        <button id="quitBtn" onclick="quitQuiz()" style="display:none; background:#e74c3c; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer;">⏹️ Quit</button>
    </div>
  </div>

  <div class="container" id="mainContainer" style="display:none;">
    <div class="progress-container" id="pCont"><div id="progressBar"></div></div>

    <div id="setupArea">
        <h2>🔥 Smart Subjective Pro</h2>
        <button id="resumeBtn" class="main-btn" style="background: #9b59b6; color: white; display: none; width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:10px;" onclick="resumeQuiz()">🕒 पिछला सेशन जारी रखें</button>
        
        <select id="subjectSelect" onchange="updateChapters()" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px;"></select>
        <select id="chapterSelect" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px;"><option value="all">-- सभी अध्याय --</option></select>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
          <input type="number" id="customLimit" placeholder="सवाल (eg. 10)" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
          <input type="number" id="customTime" placeholder="मिनट (eg. 5)" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
        </div>

        <button onclick="startQuiz()" style="width:100%; padding:14px; background:#5d6d7e; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:600;">🚀 Start Session</button>
        
        <div class="button-grid">
            <button id="weakAreasBtn" class="grid-card orange-card" style="display:none;" onclick="startWeakAreasQuiz()">
                <div style="font-size:30px; margin-right:10px;">🎯</div>
                <div><b>Weak Areas (<span id="weakCount">0</span>)</b><br><small>Improve your errors</small></div>
            </button>
            <button id="collectionBtn" class="grid-card blue-card" style="display:none;" onclick="toggleCollection()">
                <div style="font-size:30px; margin-right:10px;">📚</div>
                <div><b>Collections</b><br><small>Subject-wise saved</small></div>
            </button>
            <button class="grid-card red-card" onclick="toggleTracker()">
                <div style="font-size:30px; margin-right:10px;">📊</div>
                <div><b>Tracker</b><br><small>Revision status</small></div>
            </button>
            <button id="savedBtn" class="grid-card yellow-card" style="display:none;" onclick="startSavedPractice()">
                <div style="font-size:30px; margin-right:10px;">⭐</div>
                <div><b>Saved Qs</b><br><small>Review bookmarks</small></div>
            </button>
        </div>

        <div id="trackerArea" style="display:none; margin-top:15px; border:1px solid #ddd; padding:10px; border-radius:10px;"></div>
    </div>

    <div id="quizArea" style="display:none;">
        <div id="qCount" style="text-align:right; font-size:13px; margin-bottom:5px;"></div>
        <div id="questionBox" class="question-card"></div>
        <button id="showBtn" onclick="toggleExp()" style="width:100%; padding:12px; background:#3498db; color:white; border:none; border-radius:10px; margin-bottom:10px;">👁️ जवाब देखें</button>
        <div id="expBox" class="exp-box"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="handleResponse(true)" style="padding:15px; background:#27ae60; color:white; border:none; border-radius:10px;">✅ सही था</button>
            <button onclick="handleResponse(false)" style="padding:15px; background:#e67e22; color:white; border:none; border-radius:10px;">⚠️ सुधार चाहिए</button>
        </div>
    </div>
  </div>

  <script>
    // FIREBASE CONFIG FROM WEBSITE 1
    const firebaseConfig = {
      apiKey: "AIzaSyA_Wm4oRPvdHJ_9NVHrGGWaom5Y3lu6MBE",
      authDomain: "mystudyquiz-ac0d9.firebaseapp.com",
      databaseURL: "https://mystudyquiz-ac0d9-default-rtdb.firebaseio.com",
      projectId: "mystudyquiz-ac0d9",
      storageBucket: "mystudyquiz-ac0d9.firebasestorage.app",
      messagingSenderId: "258779460797",
      appId: "1:258779460797:web:2201be41a252ce0e53331b"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let quizData = {}, selectedQuestions = [], currentIdx = 0, score = 0, timerInterval;
    let savedList = [], weakList = [], revisionDates = {}, collections = {}, isGuest = false;

    // AUTH LOGIC
    auth.onAuthStateChanged(user => {
        if (user) {
            isGuest = false;
            document.getElementById("loginArea").style.display = "none";
            document.getElementById("mainContainer").style.display = "block";
            document.getElementById("mainHeader").style.display = "flex";
            updateUserProfile(user);
            syncFromFirebase(user.uid);
        } else if(localStorage.getItem("subj_guest") === "true") {
            continueAsGuest();
        } else {
            document.getElementById("loginArea").style.display = "flex";
        }
    });

    function updateUserProfile(user) {
        const up = document.getElementById("userProfile");
        const photo = user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        up.innerHTML = `
            <img src="${photo}">
            <div id="profileDropdown" class="profile-dropdown">
                <button onclick="logoutUser()">🚪 Logout</button>
            </div>`;
    }

    function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function continueAsGuest() {
        isGuest = true; localStorage.setItem("subj_guest", "true");
        document.getElementById("loginArea").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
        document.getElementById("mainHeader").style.display = "flex";
        document.getElementById("userProfile").innerHTML = "👤 Guest";
        initApp();
    }
    function logoutUser() { auth.signOut(); localStorage.removeItem("subj_guest"); location.reload(); }

    // DATA SYNC
    function syncToFirebase() {
        const data = { bookmarks: savedList, weak: weakList, revisions: revisionDates, collections: collections };
        if(isGuest) localStorage.setItem("subj_guest_data", JSON.stringify(data));
        else if(auth.currentUser) database.ref('users_subj/' + auth.currentUser.uid).set(data);
    }

    function syncFromFirebase(uid) {
        database.ref('users_subj/' + uid).once('value').then(snap => {
            const d = snap.val() || {};
            savedList = d.bookmarks || [];
            weakList = d.weak || [];
            revisionDates = d.revisions || {};
            collections = d.collections || {};
            initApp();
        });
    }

    // APP LOGIC
    function initApp() {
        fetch("sub.json?v=" + Math.random()).then(r => r.json()).then(j => {
            quizData = j;
            const s = document.getElementById("subjectSelect");
            s.innerHTML = "<option value='all'>-- सभी विषय --</option>";
            Object.keys(j).forEach(k => s.add(new Option(k, k)));
            updateUIButtons();
        });
    }

    function updateUIButtons() {
        document.getElementById("weakAreasBtn").style.display = weakList.length > 0 ? "flex" : "none";
        document.getElementById("weakCount").innerText = weakList.length;
        document.getElementById("savedBtn").style.display = savedList.length > 0 ? "flex" : "none";
        document.getElementById("collectionBtn").style.display = Object.keys(collections).length > 0 ? "flex" : "none";
    }

    function updateChapters() {
        const s = document.getElementById("subjectSelect").value, c = document.getElementById("chapterSelect");
        c.innerHTML = "<option value='all'>-- सभी अध्याय --</option>";
        if(s !== "all" && quizData[s]) Object.keys(quizData[s]).forEach(k => c.add(new Option(k, k)));
    }

    function startQuiz() {
        const sub = document.getElementById("subjectSelect").value;
        const ch = document.getElementById("chapterSelect").value;
        let pool = [];
        if(sub === "all") Object.keys(quizData).forEach(s => Object.keys(quizData[s]).forEach(c => pool = pool.concat(quizData[s][c])));
        else if(ch === "all") Object.keys(quizData[sub]).forEach(c => pool = pool.concat(quizData[sub][c]));
        else pool = [...quizData[sub][ch]];

        selectedQuestions = pool.sort(() => Math.random() - 0.5);
        const limit = parseInt(document.getElementById("customLimit").value);
        if(limit > 0) selectedQuestions = selectedQuestions.slice(0, limit);
        
        currentIdx = 0;
        document.getElementById("setupArea").style.display = "none";
        document.getElementById("quizArea").style.display = "block";
        document.getElementById("pCont").style.display = "block";
        document.getElementById("quitBtn").style.display = "block";
        document.getElementById("bookmarkActionBtn").style.display = "block";
        document.getElementById("heartActionBtn").style.display = "block";
        showQuestion();
    }

    function showQuestion() {
        const q = selectedQuestions[currentIdx];
        document.getElementById("progressBar").style.width = (currentIdx / selectedQuestions.length) * 100 + "%";
        document.getElementById("qCount").innerText = `प्रगति: ${currentIdx + 1} / ${selectedQuestions.length}`;
        document.getElementById("questionBox").innerText = q.question;
        
        const eb = document.getElementById("expBox");
        eb.style.display = "none";
        eb.innerHTML = (q.explanation || "") + (q.image ? `<img src="${q.image}" class="exp-img">` : "");
        
        document.getElementById("bookmarkActionBtn").classList.toggle("active", savedList.some(i => i.question === q.question));
        // Heart active logic here if needed
    }

    function toggleExp() {
        const eb = document.getElementById("expBox");
        eb.style.display = eb.style.display === "none" ? "block" : "none";
    }

    function handleResponse(correct) {
        const q = selectedQuestions[currentIdx];
        if(!correct) {
            if(!weakList.some(i => i.question === q.question)) weakList.push(q);
        } else {
            weakList = weakList.filter(i => i.question !== q.question);
        }
        syncToFirebase();
        currentIdx++;
        if(currentIdx < selectedQuestions.length) showQuestion();
        else quitQuiz();
    }

    function quitQuiz() {
        document.getElementById("quizArea").style.display = "none";
        document.getElementById("setupArea").style.display = "block";
        document.getElementById("pCont").style.display = "none";
        document.getElementById("quitBtn").style.display = "none";
        updateUIButtons();
    }

    function handleBookmarkClick() {
        const q = selectedQuestions[currentIdx];
        const idx = savedList.findIndex(i => i.question === q.question);
        if(idx > -1) savedList.splice(idx, 1); else savedList.push(q);
        document.getElementById("bookmarkActionBtn").classList.toggle("active");
        syncToFirebase();
    }

    function toggleTheme() {
        const b = document.body;
        b.hasAttribute("data-theme") ? b.removeAttribute("data-theme") : b.setAttribute("data-theme", "dark");
    }

    function toggleProfileMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById("profileDropdown");
        menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }

    window.onclick = () => document.getElementById("profileDropdown").style.display = "none";

  </script>
</body>
</html>
